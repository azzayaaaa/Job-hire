services:
  - type: web
    name: jobhub-backend
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm backend:start
    healthCheckPath: /health
    envVars:
      - key: FRONTEND_URL
        value: https://a-two-red.vercel.app
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
